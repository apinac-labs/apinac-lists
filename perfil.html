<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - APINAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --border: #30363d; --update: #e3b341; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
        .container { max-width: 650px; margin: auto; }
        .back-btn { color: var(--accent); text-decoration: none; font-size: 0.9rem; display: block; margin-bottom: 20px; font-weight: 600; }
        
        .ficha { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        h1 { color: #fff; font-size: 1.8rem; margin: 0; letter-spacing: -0.5px; }
        .alias { color: var(--accent); font-weight: 600; font-size: 1rem; margin-bottom: 25px; display: block; opacity: 0.9; }
        
        .section-title { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin: 30px 0 15px; font-weight: 600; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .label { font-size: 0.75rem; color: #8b949e; display: block; margin-bottom: 2px; }
        .valor { font-size: 1.05rem; color: #fff; font-weight: 400; }

        .red-social-card { background: #21262d; border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 15px; }
        .social-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .badge-container { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; max-width: 60%; }
        .status-badge { font-size: 0.6rem; padding: 4px 10px; border-radius: 6px; background: #30363d; color: var(--accent); font-weight: bold; border: 1px solid var(--accent); text-transform: uppercase; }
        
        .notas-box { background: #0d1117; border: 1px solid var(--border); padding: 20px; border-radius: 12px; font-size: 1rem; color: #c9d1d9; min-height: 80px; }
        
        .footer-update { text-align: center; margin-top: 35px; padding-top: 20px; border-top: 1px solid var(--border); }
        .upd-label { display: block; font-size: 0.8rem; color: #8b949e; }
        .upd-date { font-size: 1.2rem; color: var(--update); font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-btn">← Volver al Listado</a>
        <div id="content"></div>
    </div>

    <script src="datos.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const s = sujetos[params.get('id')];
        
        function createBadges(statusString) {
            if (!statusString || statusString === "---") return '<span class="status-badge">Sin Datos</span>';
            // Separamos por comas si los escribes así en datos.js: "Verificada, Activa, Pública"
            return statusString.split(',').map(status => `<span class="status-badge">${status.trim()}</span>`).join('');
        }

        if (s) {
            document.getElementById('content').innerHTML = `
                <div class="ficha">
                    <h1>${s.nombre}</h1>
                    <span class="alias">Alias/Identificación: ${s.alias}</span>

                    <div class="section-title">Información de Contacto</div>
                    <div class="grid">
                        <div class="info-block"><span class="label">Número de Teléfono</span><span class="valor">${s.tlf}</span></div>
                        <div class="info-block"><span class="label">Fecha de Nacimiento</span><span class="valor">${s.cumple}</span></div>
                    </div>

                    <div class="section-title">Redes Sociales</div>
                    
                    <div class="red-social-card">
                        <div class="social-header">
                            <div><span class="label">TikTok</span><span class="valor"><b>${s.tt_name}</b></span></div>
                            <div class="badge-container">${createBadges(s.tt_st)}</div>
                        </div>
                        <span class="label">Usuario</span><span class="valor">${s.tt_user}</span>
                    </div>

                    <div class="red-social-card">
                        <div class="social-header">
                            <div><span class="label">Instagram</span><span class="valor"><b>${s.ig_name}</b></span></div>
                            <div class="badge-container">${createBadges(s.ig_st)}</div>
                        </div>
                        <span class="label">Usuario</span><span class="valor">${s.ig_user}</span>
                    </div>

                    <div class="red-social-card">
                        <div class="social-header">
                            <div><span class="label">Roblox</span><span class="valor"><b>${s.rb_name}</b></span></div>
                            <div class="badge-container">${createBadges(s.rb_st)}</div>
                        </div>
                        <span class="label">Nombre de Usuario</span><span class="valor">${s.rb_user}</span>
                    </div>
                    
${s.extra ? `
    <div class="section-title">Cuentas Secundarias / Respaldo</div>
    <div class="red-social-card" style="border-color: #444;">
        <p style="font-size: 0.9rem; color: #fff; margin: 0;">${s.extra}</p>
    </div>
` : ''}

                    <div class="section-title">Observaciones de Campo</div>
                    <div class="notas-box">${s.nota}</div>

                    <div class="footer-update">
                        <span class="upd-label">ÚLTIMA ACTUALIZACIÓN:</span>
                        <span class="upd-date">${s.actualizado}</span>
                    </div>
                </div>
            `;
        } else {
            document.getElementById('content').innerHTML = `<p>Sujeto no encontrado en la base de datos.</p>`;
        }
    </script>
</body>
</html>

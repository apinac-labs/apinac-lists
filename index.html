<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APINAC Lists - Inicio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --accent: #58a6ff;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.4;
        }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.2rem; color: #fff; margin-bottom: 5px; }
        .sub { font-size: 0.8rem; color: #8b949e; }
        
        .container { max-width: 500px; margin: auto; }
        
        .card-lista {
            background: var(--card);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .card-lista:active { transform: scale(0.97); }
        
        h3 { 
            margin: 0; 
            font-size: 0.95rem; 
            color: var(--accent);
            font-weight: 600;
        }
        p { 
            margin: 5px 0 0; 
            font-size: 0.75rem; 
            color: #8b949e; 
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Bienvenido a APINAC Lists</h1>
            <p class="sub">Seleccione una lista para comenzar.</p>
        </header>

        <main>
            <div class="card-lista" onclick="irALista('sexto_tigre')">
                <h3>6to Grado "D" - UE "El Tigre"</h3>
                <p>Para recordar esos tiempos.</p>
            </div>

            <div class="card-lista" onclick="irALista('primero_bello')">
                <h3>1er Año "U" - UEIP "Andrés Bello"</h3>
                <p>El Archivo de la primera.</p>
            </div>

            <div class="card-lista" onclick="irALista('segundo_bello')">
                <h3>2do Año "U" - UEIP "Andrés Bello"</h3>
                <p>Nuestra etapa actual.</p>
            </div>

            <div class="card-lista" onclick="irALista('soulsnow_family')">
                <h3>Soulsnow's Family</h3>
                <p>La Familia.</p>
            </div>
        </main>
    </div>

    <script>
        function irALista(id) {
            window.location.href = `estudiantes.html?lista=${id}`;
        }
    </script>
</body>
</html>
